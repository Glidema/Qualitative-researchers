<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f5f0" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>质性研究者人格测试</title>
    <style>
      /* 首屏占位，避免 QQ/ Safari 白屏或闪烁 */
      #root { min-height: 100vh; min-height: -webkit-fill-available; background: #f5f5f0; }
      #root-loading {
        position: fixed; inset: 0; background: #f5f5f0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        padding: 1rem; color: #78716c; font-family: system-ui, sans-serif; font-size: 15px;
      }
      #root-loading::after {
        content: ''; width: 28px; height: 28px; margin-top: 12px;
        border: 2px solid #d6d3d1; border-top-color: #57534e; border-radius: 50%;
        animation: root-spin 0.8s linear infinite;
      }
      @keyframes root-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="root-loading" aria-hidden="true">加载中…</div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // 若 12 秒后仍在“加载中”，说明脚本未执行（如不支持 type=module），显示提示
      setTimeout(function() {
        var el = document.getElementById('root-loading');
        if (!el) return;
        el.id = 'load-timeout-msg';
        el.innerHTML = '<p style="margin:0 0 12px;font-size:15px;color:#444">加载超时</p><p style="margin:0 0 16px;font-size:14px;color:#78716c;line-height:1.5">请尝试：<br>1. 刷新页面<br>2. 用手机<strong>系统自带浏览器</strong>（Safari / Chrome）打开此链接<br>3. 若在 QQ/微信内，点右上角 … 选「在浏览器中打开」</p><button type="button" onclick="location.reload()" style="padding:10px 20px;background:#444;color:#fff;border:none;border-radius:12px;font-size:15px;cursor:pointer">刷新</button>';
        el.style.animation = 'none';
      }, 12000);
    </script>
  </body>
</html>
